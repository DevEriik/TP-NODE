<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentes de valorant</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <h1>Agentes de Valorant...</h1>
    <div id="characters-container" class="agentes-grid"></div>
      <div class="form-container">
        <h2>Agregar Nuevo Agente</h2>
        <form id="character-form">
          <input type="text" id="name" placeholder="Nombre (ej. Killjoy)" required>
          <input type="text" id="race" placeholder="Raza (ej. Humano)" required>
          <input type="text" id="role" placeholder="Rol (ej. Centinela)" required>
          <input type="number" id="level" placeholder="Nivel (ej. 45)" required>
          <input type="text" id="universe" placeholder="Universo (ej. Valorant)" required>
          <button type="submit">Crear Agente</button>
        </form>
      </div>
  </body>
</html>
